<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderTrack - Προφίλ Χρήστη</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: 700;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">OrderTrack</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="order_list.html"><i class="bi bi-box-seam"></i> Οι Παραγγελίες μου</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="profile.html"><i class="bi bi-person"></i> Προφίλ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="login.html"><i class="bi bi-box-arrow-right"></i> Αποσύνδεση</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm text-center py-4">
                <div class="card-body">
                    <div class="mb-3">
                        <div class="bg-light text-primary rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 100px; height: 100px;">
                            <i class="bi bi-person-fill" style="font-size: 3.5rem;"></i>
                        </div>
                    </div>
                    <h4 class="fw-bold mb-1">Νίκος Παπαδόπουλος</h4>
                    <p class="text-muted small mb-3">@nikos_papadopoulos</p>
                    <div class="badge bg-light text-secondary border px-3 py-2 rounded-pill">
                        <i class="bi bi-calendar3"></i> Μέλος από: Μάιος 2026
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3 border-0">
                    <h5 class="fw-bold mb-0"><i class="bi bi-gear"></i> Διαχείριση Στοιχείων Λογαριασμού</h5>
                </div>
                <div class="card-body px-4">
                    <form action="#" method="GET">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="firstName" class="form-label fw-semibold small">Όνομα</label>
                                <input type="text" class="form-control" id="firstName" value="Νίκος">
                            </div>
                            <div class="col-md-6">
                                <label for="lastName" class="form-label fw-semibold small">Επώνυμο</label>
                                <input type="text" class="form-control" id="lastName" value="Παπαδόπουλος">
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="email" class="form-label fw-semibold small">Email (Δεν αλλάζει)</label>
                                <input type="email" class="form-control bg-light" id="email" value="nikos@example.com" readonly>
                            </div>
                            <div class="col-md-6">
                                <label for="phone" class="form-label fw-semibold small">Κινητό Τηλέφωνο</label>
                                <input type="tel" class="form-control" id="phone" value="6971234567">
                            </div>
                        </div>

                        <h6 class="fw-bold text-secondary mt-4 mb-3"><i class="bi bi-geo-alt"></i> Προεπιλεγμένη Διεύθυνση Αποστολής</h6>
                        
                        <div class="mb-3">
                            <label for="address" class="form-label fw-semibold small">Διεύθυνση (Οδός, Αριθμός)</label>
                            <input type="text" class="form-control" id="address" value="Πανεπιστημίου 25">
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-8">
                                <label for="city" class="form-label fw-semibold small">Πόλη / Περιοχή</label>
                                <input type="text" class="form-control" id="city" value="Αθήνα">
                            </div>
                            <div class="col-md-4">
                                <label for="zipCode" class="form-label fw-semibold small">Ταχυδρομικός Κώδικας (Τ.Κ.)</label>
                                <input type="text" class="form-control" id="zipCode" value="10672">
                            </div>
                        </div>

                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary fw-bold px-4">Αποθήκευση Αλλαγών</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
