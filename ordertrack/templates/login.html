<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderTrack - Σύνδεση Χρήστη</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-container {
            max-width: 420px;
            margin-top: 100px;
        }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="card shadow-sm border-0 px-4 py-4">
        <div class="card-body">
            <h3 class="text-center fw-bold text-primary mb-2">OrderTrack</h3>
            <p class="text-muted text-center mb-4">Σύνδεση στο λογαριασμό σας</p>
            
            <form action="#" method="GET">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Όνομα Χρήστη</label>
                    <input type="text" class="form-control" id="username" placeholder="Εισάγετε το username σας" required>
                </div>

                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <label for="password" class="form-label fw-semibold mb-0">Κωδικός Πρόσβασης</label>
                        <a href="#" class="text-primary small text-decoration-none">Ξεχάσατε τον κωδικό;</a>
                    </div>
                    <input type="password" class="form-control mt-2" id="password" placeholder="Εισάγετε τον κωδικό σας" required>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                    <label class="form-check-label text-muted small" for="rememberMe">
                        Να με θυμάσαι σε αυτή τη συσκευή
                    </label>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary fw-bold py-2">Είσοδος στο Σύστημα</button>
                </div>
            </form>

            <hr class="my-4 text-muted">

            <div class="text-center">
                <span class="text-muted small">Δεν έχετε λογαριασμό; </span>
                <a href="signup.html" class="text-primary small fw-semibold text-decoration-none">Δημιουργήστε έναν εδώ</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
