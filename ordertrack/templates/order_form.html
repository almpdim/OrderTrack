<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderTrack - Νέα Παραγγελία</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: 700;
        }
        .card {
            border: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">OrderTrack Pro</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="order_list.html"><i class="bi bi-box-seam"></i> Οι Παραγγελίες μου</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="profile.html"><i class="bi bi-person"></i> Προφίλ</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mb-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-secondary mb-0">Καταχώρηση Νέας Παραγγελίας</h2>
            <p class="text-muted mb-0">Συμπληρώστε τα στοιχεία για να ξεκινήσει η παρακολούθηση</p>
        </div>
        <a href="order_list.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Επιστροφή στη Λίστα</a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            
            <div class="card shadow-sm p-4 bg-white">
                <form action="#" method="POST" onsubmit="return false;">
                    
                    <h5 class="fw-bold mb-3 text-primary border-bottom pb-2"><i class="bi bi-cart-fill"></i> 1. Αντικείμενα Παραγγελίας</h5>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-8">
                            <label class="form-label small fw-semibold text-muted">Όνομα Προϊόντος / Περιγραφή</label>
                            <input type="text" class="form-control form-control-sm" value="Ασύρματα Ακουστικά Bluetooth" readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-semibold text-muted">Ποσότητα</label>
                            <input type="number" class="form-control form-control-sm" value="1" readonly>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-8">
                            <input type="text" class="form-control form-control-sm" placeholder="Προσθήκη δεύτερου προϊόντος (προαιρετικό)">
                        </div>
                        <div class="col-md-4">
                            <input type="number" class="form-control form-control-sm" placeholder="Ποσότητα" min="1">
                        </div>
                    </div>

                    <h5 class="fw-bold mb-3 text-primary border-bottom pb-2"><i class="bi bi-geo-alt-fill"></i> 2. Πληροφορίες Παράδοσης</h5>
                    
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="useProfileAddress" checked disabled>
                        <label class="form-check-label small text-muted fw-semibold" for="useProfileAddress">
                            Χρήση της αποθηκευμένης διεύθυνσης από το Προφίλ μου
                        </label>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-12">
                            <label for="address" class="form-label small fw-semibold text-muted">Διεύθυνση (Οδός και Αριθμός)</label>
                            <input type="text" class="form-control form-control-sm" id="address" value="Πανεπιστημίου 25" required>
                        </div>
                        <div class="col-md-6">
                            <label for="city" class="form-label small fw-semibold text-muted">Πόλη</label>
                            <input type="text" class="form-control form-control-sm" id="city" value="Αθήνα" required>
                        </div>
                        <div class="col-md-6">
                            <label for="zip" class="form-label small fw-semibold text-muted">Ταχυδρομικός Κώδικας</label>
                            <input type="text" class="form-control form-control-sm" id="zip" value="10672" required>
                        </div>
                    </div>

                    <h5 class="fw-bold mb-3 text-primary border-bottom pb-2"><i class="bi bi-chat-left-text-fill"></i> 3. Επιπλέον Σχόλια</h5>
                    <div class="mb-4">
                        <label for="notes" class="form-label small fw-semibold text-muted">Οδηγίες για την παράδοση (Προαιρετικό)</label>
                        <textarea class="form-control form-control-sm" id="notes" rows="3" placeholder="π.χ. Παράδοση στο γραφείο του 1ου ορόφου..."></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2 pt-3 border-top">
                        <a href="order_list.html" class="btn btn-light btn-sm fw-semibold border px-4">Ακύρωση</a>
                        <button type="button" class="btn btn-primary btn-sm fw-bold px-4"><i class="bi bi-check-circle"></i> Υποβολή Παραγγελίας</button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
