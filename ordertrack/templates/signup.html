<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderTrack - Εγγραφή Χρήστη</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .signup-container {
            max-width: 450px;
            margin-top: 60px;
        }
    </style>
</head>
<body>

<div class="container signup-container mb-5">
    <div class="card shadow-sm border-0 px-4 py-4">
        <div class="card-body">
            <h3 class="text-center fw-bold text-primary mb-2">OrderTrack</h3>
            <p class="text-muted text-center mb-4">Δημιουργία νέου λογαριασμού</p>
            
            <form action="{% url 'signup' %}" method="POST">
                {% csrf_token %}
    
                {% if error_message %}
                    <div class="alert alert-danger py-2 small text-center">{{ error_message }}</div>
                {% endif %}

                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Όνομα Χρήστη (Username)</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="π.χ. niko_pap" required>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label fw-semibold">Όνομα</label>
                        <input type="text" class="form-control" id="firstName" name="first_name" placeholder="Νίκος" required>
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label fw-semibold">Επώνυμο</label>
                        <input type="text" class="form-control" id="lastName" name="last_name" placeholder="Παπαδόπουλος" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Κωδικός Πρόσβασης</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Τουλάχιστον 8 χαρακτήρες" required>
                </div>

                <div class="mb-4">
                    <label for="password_confirm" class="form-label fw-semibold">Επιβεβαίωση Κωδικού</label>
                    <input type="password" class="form-control" id="password_confirm" name="password_confirm" placeholder="Επανεισάγετε τον κωδικό" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary fw-bold py-2">Ολοκλήρωση Εγγραφής</button>
                </div>
            </form>

            <hr class="my-4 text-muted">

            <div class="text-center">
                <span class="text-muted small">Έχετε ήδη λογαριασμό; </span>
                <a href="{% url 'login' %}" class="text-primary small fw-semibold text-decoration-none">Συνδεθείτε εδώ</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
